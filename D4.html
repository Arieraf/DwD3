<body>
    
    <main>   
        <header>
            Data Pengeluaran
        </header>
        
        <hr>


        <div class="container mt-5">
        <div class="row">

            <div class="col-md-6">
                
                <form id="myForm">
                    <div class="mb-3">
                        <label>Jenis Pengeluaran</label>
                        <input type="text" id="nama" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label>Nominal Harga</label>
                        <input type="number" id="nomin" class="form-control">
                    </div>

                    <button type="submit" class="btn btn-primary">Submit</button>

                </form>
            </div>

            

            <div class="col-md-6">
                <h3>Data Pengeluaran</h3>
                <ul id="listPengeluaran" class="list-group"></ul>  

                <h5>
                    Total Pengeluaran : Rp <span id="totalPengeluaran">0</span>
                </h5>
            </div>
        </div>
    </div>
